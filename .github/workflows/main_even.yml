# Build and deploy ASP.NET Core app to Azure Web App - Even
# Docs: https://github.com/Azure/webapps-deploy

name: Build and deploy ASP.NET Core app to Azure Web App - Even

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore "Event Ease 2026 Ntsika Nkonki.csproj"

      - name: Build
        run: dotnet build "Event Ease 2026 Ntsika Nkonki.csproj" --configuration Release --no-restore

      - name: Publish
        run: dotnet publish "Event Ease 2026 Ntsika Nkonki.csproj" -c Release -o ./publish

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ./publish

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app
          path: ./publish   # force artifact into ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'Even'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: ./publish

      - name: Apply EF Core migrations
        run: sqlcmd -S ${{ secrets.AZURE_SQL_SERVER }} -d "the back pack" -U ${{ secrets.AZURE_SQL_USER }} -P ${{ secrets.AZURE_SQL_PASSWORD }} -i migrations.sql
